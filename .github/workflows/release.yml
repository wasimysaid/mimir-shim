name: Release Mimir

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example 0.1.10 or v0.1.10"
        required: true
        type: string
      source_ref:
        description: "Private source ref to build. Defaults to main; pass v<version> for tagged releases."
        required: false
        type: string

permissions: {}

concurrency:
  group: release-mimir-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      release_version: ${{ steps.prepare.outputs.release_version }}
      release_tag: ${{ steps.prepare.outputs.release_tag }}
      source_ref: ${{ steps.prepare.outputs.source_ref }}
    steps:
      - id: prepare
        shell: bash
        run: |
          set -euo pipefail
          release_version="${{ inputs.version }}"
          release_version="${release_version#v}"
          release_tag="v${release_version}"
          source_ref="${{ inputs.source_ref }}"
          if [[ -z "$source_ref" ]]; then
            source_ref="main"
          fi
          {
            echo "release_version=$release_version"
            echo "release_tag=$release_tag"
            echo "source_ref=$source_ref"
          } >> "$GITHUB_OUTPUT"

  installer-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout shim
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Validate shell scripts
        shell: bash
        run: |
          set -euo pipefail
          bash -n install
          bash -n install.sh

          sh -n install.sh
          bash -n scripts/build-release.sh

          test -f install.ps1

      - name: Smoke-test local binary install path
        shell: bash
        run: |
          set -euo pipefail
          tmp="$(mktemp -d)"
          fake="$tmp/mimir"
          cat > "$fake" <<'EOF'
          #!/bin/sh
          if [ "${1:-}" = "--version" ]; then
            echo "0.0.0-test"
            exit 0
          fi
          echo "fake mimir"
          EOF
          chmod +x "$fake"
          MIMIR_INSTALL_DIR="$tmp/bin" sh ./install.sh --binary "$fake" --no-modify-path
          "$tmp/bin/mimir" --version | grep -Fx "0.0.0-test"


  windows-installer-check:
    runs-on: windows-latest
    steps:
      - name: Checkout shim
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Validate and smoke-test PowerShell installer
        shell: pwsh
        run: |
          Set-StrictMode -Version 2.0
          $ErrorActionPreference = "Stop"
          Get-Command .\install.ps1 | Out-Null
          .\install.ps1 -Help | Out-String | Select-String "Mimir Windows Installer" | Out-Null

          $tmp = New-Item -ItemType Directory -Path ([IO.Path]::Combine([IO.Path]::GetTempPath(), [Guid]::NewGuid().ToString("N")))
          try {
            $fake = Join-Path $tmp.FullName "mimir.exe"
            Set-Content -LiteralPath $fake -Value "fake mimir" -NoNewline
            $installDir = Join-Path $tmp.FullName "bin"
            .\install.ps1 -Binary $fake -InstallDir $installDir -NoModifyPath
            if (-not (Test-Path -LiteralPath (Join-Path $installDir "mimir.exe") -PathType Leaf)) {
              throw "PowerShell installer did not copy mimir.exe"
            }
          }
          finally {
            Remove-Item -LiteralPath $tmp.FullName -Recurse -Force -ErrorAction SilentlyContinue
          }

  build:
    needs:
      - prepare
      - installer-check

      - windows-installer-check
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x64
            runner: ubuntu-latest
          - platform: windows-x64
            runner: windows-2022
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout shim
        uses: actions/checkout@v5
        with:
          path: shim
          persist-credentials: false

      - name: Checkout private Mimir source
        uses: actions/checkout@v5
        with:
          repository: wasimysaid/mimir
          ref: ${{ needs.prepare.outputs.source_ref }}
          token: ${{ secrets.MIMIR_SOURCE_TOKEN }}
          path: source
          persist-credentials: false

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable


      - name: Install Linux musl target
        if: matrix.platform == 'linux-x64'
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y musl-tools
          rustup target add x86_64-unknown-linux-musl
      - name: Test version parsing
        shell: bash
        working-directory: source
        run: cargo test -p mimir-cli parse_version --locked

      - name: Build release asset
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets
          bash shim/scripts/build-release.sh \
            --source-dir source \
            --out release-assets \
            --platform "${{ matrix.platform }}" \
            --version "${{ needs.prepare.outputs.release_version }}"

      - name: Upload release asset
        uses: actions/upload-artifact@v5
        with:
          name: mimir-${{ matrix.platform }}
          path: |
            release-assets/mimir-${{ matrix.platform }}.*
          if-no-files-found: error
          retention-days: 7

  stage-release:
    needs:
      - prepare
      - build
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write
    env:
      GH_REPO: ${{ github.repository }}
      RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
      RELEASE_VERSION: ${{ needs.prepare.outputs.release_version }}
      SOURCE_REF: ${{ needs.prepare.outputs.source_ref }}
    steps:
      - name: Download release assets
        uses: actions/download-artifact@v5
        with:
          path: downloaded-assets

      - name: Prepare and validate release payload
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets
          find downloaded-assets -type f -name 'mimir-*' -exec cp {} release-assets/ \;
          cd release-assets

          expected_assets=(
            mimir-linux-x64.tar.gz
            mimir-windows-x64.zip
          )

          for asset in "${expected_assets[@]}"; do
            test -f "$asset"
          done

          rm -f ./*.sha256
          sha256sum "${expected_assets[@]}" > SHA256SUMS
          sha256sum -c SHA256SUMS

          cat > RELEASE_NOTES.md <<EOF
          # Mimir ${RELEASE_VERSION}

          Built from private source ref \`${SOURCE_REF}\`.

          ## Assets

          - linux x64: \`mimir-linux-x64.tar.gz\`
          - Windows x64: \`mimir-windows-x64.zip\`

          Verify downloads with \`SHA256SUMS\`.
          EOF

          expected_names="$(printf '%s\n' "${expected_assets[@]}" SHA256SUMS RELEASE_NOTES.md | sort)"
          actual_names="$(find . -maxdepth 1 -type f -printf '%f\n' | sort)"
          if [[ "$actual_names" != "$expected_names" ]]; then
            echo "Unexpected release asset set" >&2
            diff -u <(printf '%s\n' "$expected_names") <(printf '%s\n' "$actual_names") || true
            exit 1
          fi

      - name: Create draft GitHub Release and upload assets
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          cd release-assets

          existing_release="$(gh release view "$RELEASE_TAG" --json isDraft --jq .isDraft 2>/dev/null || true)"
          if [[ "$existing_release" == "false" ]]; then
            echo "::error::GitHub Release $RELEASE_TAG is already published. Refusing to mutate it."
            exit 1
          fi
          if [[ "$existing_release" == "true" ]]; then
            gh release delete "$RELEASE_TAG" --yes
          fi

          gh release create "$RELEASE_TAG" \
            --draft \
            --title "$RELEASE_TAG" \
            --notes-file RELEASE_NOTES.md \
            mimir-linux-x64.tar.gz \
            mimir-windows-x64.zip \
            RELEASE_NOTES.md \
            SHA256SUMS

          expected_asset_names="$(printf '%s\n' mimir-linux-x64.tar.gz mimir-windows-x64.zip SHA256SUMS RELEASE_NOTES.md | sort)"
          actual_asset_names="$(gh release view "$RELEASE_TAG" --json assets --jq '.assets[].name' | sort)"
          if [[ "$actual_asset_names" != "$expected_asset_names" ]]; then
            echo "::error::Draft GitHub Release asset set does not match expected files."
            diff -u <(printf '%s\n' "$expected_asset_names") <(printf '%s\n' "$actual_asset_names") || true
            exit 1
          fi

      - name: Publish staged GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          existing_release="$(gh release view "$RELEASE_TAG" --json isDraft --jq .isDraft 2>/dev/null || true)"
          if [[ "$existing_release" != "true" ]]; then
            echo "::error::Draft GitHub Release $RELEASE_TAG does not exist."
            exit 1
          fi
          gh release edit "$RELEASE_TAG" --draft=false

  cleanup-draft-release:
    needs:
      - prepare
      - stage-release
    if: ${{ always() && needs.stage-release.result != 'success' && needs.stage-release.result != 'skipped' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
      GH_REPO: ${{ github.repository }}
    steps:
      - name: Delete failed draft release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          existing_release="$(gh release view "$RELEASE_TAG" --json isDraft --jq .isDraft 2>/dev/null || true)"
          if [[ "$existing_release" == "true" ]]; then
            gh release delete "$RELEASE_TAG" --yes
          fi
